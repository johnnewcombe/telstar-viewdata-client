name: macOS Release Builder

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish osx-arm64
        run: |
          dotnet publish --self-contained --configuration Release \
            --os osx --arch arm64 \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:InformationalVersion=${{ steps.version.outputs.VERSION }}

      - name: Publish osx-x64
        run: |
          dotnet publish --self-contained --configuration Release \
            --os osx --arch x64 \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:InformationalVersion=${{ steps.version.outputs.VERSION }}

      - name: Build arm64 zip
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          APPBUNDLE="TelstarClient.app"
          mkdir -p $APPBUNDLE/Contents/MacOS
          mkdir -p $APPBUNDLE/Contents/Resources
          cp -r bin/Release/net9.0/osx-arm64/publish/* $APPBUNDLE/Contents/MacOS/
          chmod +x $APPBUNDLE/Contents/MacOS/TelstarClient
          cp Assets/icon.icns $APPBUNDLE/Contents/Resources/icon.icns
          sed "s/VERSION_PLACEHOLDER/$VERSION/g" Assets/TelstarClient.app.plist > $APPBUNDLE/Contents/Info.plist
          zip -r TelstarClient-macos-arm64-$VERSION.zip $APPBUNDLE
          rm -rf $APPBUNDLE

      - name: Build x64 zip
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          APPBUNDLE="TelstarClient.app"
          mkdir -p $APPBUNDLE/Contents/MacOS
          mkdir -p $APPBUNDLE/Contents/Resources
          cp -r bin/Release/net9.0/osx-x64/publish/* $APPBUNDLE/Contents/MacOS/
          chmod +x $APPBUNDLE/Contents/MacOS/TelstarClient
          cp Assets/icon.icns $APPBUNDLE/Contents/Resources/icon.icns
          sed "s/VERSION_PLACEHOLDER/$VERSION/g" Assets/TelstarClient.app.plist > $APPBUNDLE/Contents/Info.plist
          zip -r TelstarClient-macos-x64-$VERSION.zip $APPBUNDLE
          rm -rf $APPBUNDLE

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TelstarClient-macos-arm64-${{ steps.version.outputs.VERSION }}.zip
            TelstarClient-macos-x64-${{ steps.version.outputs.VERSION }}.zip